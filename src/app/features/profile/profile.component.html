<div class="profile-page">

  <div class="profile-container" *ngIf="isLoaded; else loading">

    <div class="profile-header">
      <h2>Thông tin cá nhân</h2>
      <p class="role">Vai trò: {{ user.roleName }}</p>
    </div>

    <form (ngSubmit)="saveProfile()">

      <div class="form-group">
        <label>Họ tên:</label>
        <input [(ngModel)]="user.userName" name="userName" type="text">
      </div>

      <div class="form-group">
        <label>Email:</label>
        <input [(ngModel)]="user.email" name="email" type="email" disabled>
      </div>

      <div class="form-group">
        <label>Số điện thoại:</label>
        <input [(ngModel)]="user.phone" name="phone" type="text">
      </div>

      <div class="form-group">
        <label>Ngày sinh:</label>
        <input [(ngModel)]="user.dateOfBirth" name="dateOfBirth" type="date">
      </div>

      <div class="form-group">
        <label>Địa chỉ:</label>
        <input [(ngModel)]="user.address" name="address" type="text">
      </div>

      <div class="form-buttons">
        <button type="button" class="btn-back" (click)="goBack()">Quay lại</button>
        <button type="submit" class="btn-save">Lưu</button>
      </div>

    </form>

  </div>

</div>

<ng-template #loading>
  <p class="loading">Đang tải thông tin người dùng...</p>
</ng-template>
