<div class="profile-page">

  <div class="profile-container" *ngIf="isLoaded; else loading">

    <div class="profile-header">
      <h2>Thông tin cá nhân</h2>
      <p class="role">Vai trò: {{ user.roleName }}</p>
    </div>

    <form (ngSubmit)="saveProfile()">

      <div class="form-group">
        <label>Họ tên:</label>
        <input [(ngModel)]="user.userName" name="userName" type="text">
      </div>

      <div class="form-group">
        <label>Email:</label>
        <input [(ngModel)]="user.email" name="email" type="email" disabled>
      </div>

      <div class="form-group">
        <label>Mật khẩu:</label>

        <div class="security-section">

          <div class="password-row" (click)="togglePasswordForm()">
            <span class="pw-dots">••••••••</span>
            <button type="button" class="btn-change-pw">
              {{ showPasswordForm ? 'Huỷ' : 'Đổi mật khẩu' }}
              <svg [class.rotated]="showPasswordForm" width="14" height="14" viewBox="0 0 16 16" fill="none">
                <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>

          <div class="password-form-wrap" [class.open]="showPasswordForm">
            <div class="password-form-inner">

              <div class="form-group">
                <label>Mật khẩu hiện tại:</label>
                <input [(ngModel)]="passwordData.currentPassword" name="currentPassword" type="password">
              </div>

              <div class="form-group">
                <label>Mật khẩu mới:</label>
                <input [(ngModel)]="passwordData.newPassword" name="newPassword" type="password">
              </div>

              <div class="form-group">
                <label>Xác nhận mật khẩu:</label>
                <input [(ngModel)]="passwordData.confirmPassword" name="confirmPassword" type="password">
              </div>

              <div class="form-buttons">
                <button type="button" class="btn-save" (click)="changePassword()">
                  Đổi mật khẩu
                </button>
              </div>

            </div>
          </div>

        </div>
      </div>

      <div class="form-group">
        <label>Số điện thoại:</label>
        <input [(ngModel)]="user.phone" name="phone" type="text">
      </div>

      <div class="form-group">
        <label>Ngày sinh:</label>
        <input [(ngModel)]="user.dateOfBirth" name="dateOfBirth" type="date">
      </div>

      <div class="form-group">
        <label>Địa chỉ:</label>
        <input [(ngModel)]="user.address" name="address" type="text">
      </div>

      <div class="form-buttons">
        <button type="button" class="btn-back" (click)="goBack()">Quay lại</button>
        <button type="submit" class="btn-save">Lưu</button>
      </div>

    </form>

  </div>


</div>


<ng-template #loading>
  <p class="loading">Đang tải thông tin người dùng...</p>
</ng-template>
