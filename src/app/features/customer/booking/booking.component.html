<div class="booking-container">
    <h2>Đặt tour</h2>

    <form (ngSubmit)="submitBooking()">
        <div>
            <label for="quantity">Số lượng người:</label>
            <input type="number" id="quantity" name="quantity" [(ngModel)]="quantity" min="1" required />
        </div>

        <button type="submit">
            Xác nhận đặt tour
        </button>
    </form>
</div>
