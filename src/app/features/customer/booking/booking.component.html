<div class="booking-container">

  <h2>Đặt Tour: {{ tour?.tourName }}</h2>

  <div class="image-wrapper" *ngIf="tour?.img">
    <img [src]="getImageUrl(tour.img)" />
  </div>

  <div class="tour-info" *ngIf="tour">
    <p><strong>Giá vé:</strong> {{ tour.price | number }} VND</p>
    <p><strong>Thời gian:</strong> {{ tour.startDate }} → {{ tour.endDate }}</p>
    <p><strong>Số chỗ còn:</strong> {{ tour.quantity }}</p>
  </div>

  <form (ngSubmit)="submitBooking()" class="booking-form">

    <div class="form-group">
      <label>Số lượng người:</label>
      <input type="number"
             [(ngModel)]="quantity"
             name="quantity"
             min="1"
             (ngModelChange)="onQuantityChange()"
             required />
    </div>

    <div class="form-group">
      <label>Mã khuyến mãi:</label>
      <input type="text"
             [(ngModel)]="promotionCode"
             name="promotionCode"
             placeholder="Nhập mã..."
             (blur)="applyPromotion()" />
    </div>

    <div class="total">
      <p><strong>Giá gốc:</strong> {{ basePrice | number }} VND</p>

      <p *ngIf="discountPercent > 0">
        <strong>Giảm:</strong> {{ discountPercent }}%
      </p>

      <h3>
        <strong>Tổng tiền:</strong> {{ finalPrice | number }} VND
      </h3>
    </div>

    <button type="submit" class="btn-submit">
      Xác nhận đặt tour
    </button>

  </form>

</div>
