<h2 class="page-title">Mã khuyến mãi</h2>

<div class="promo-list">

  <div class="promo-card" *ngFor="let p of promotions">

    <div class="promo-header">
      <span class="code">{{ p.code }}</span>
      <span class="discount">-{{ p.discount }}%</span>
    </div>

    <div class="promo-body">
      <p class="date">
        {{ p.startDate | date:'dd/MM/yyyy' }}
        →
        {{ p.endDate | date:'dd/MM/yyyy' }}
      </p>

      <p class="status" [class.active]="p.isActive">
        {{ p.isActive ? 'Đang hoạt động' : 'Hết hạn' }}
      </p>
    </div>

    <button class="btn-copy" (click)="copyCode(p.code)">
      Copy mã
    </button>

  </div>

</div>

<div *ngIf="promotions.length === 0" class="empty">
  Không có mã khuyến mãi
</div>
