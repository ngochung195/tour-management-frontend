<h2>Danh sách tour</h2>

<div class="tour-list">
    <div class="tour-card" *ngFor="let tour of tours">
        <img [src]="tour.img" alt="">
        <h3>{{tour.tourName}}</h3>
        <p>Giá: {{tour.price | currency: 'VND'}}</p>
        <p>Ngày bắt đầu: {{ tour.startDate | date:'dd/MM/yyyy' }}</p>
        <p>Ngày kết thúc: {{ tour.endDate | date:'dd/MM/yyyy' }}</p>
        <button type="button" [routerLink]="['/customer/booking', tour.id]">Đặt tour</button>
    </div>
</div>
