<div class="edit-container">

  <h2>Chỉnh sửa lịch trình</h2>

  <form (ngSubmit)="updateItinerary()" *ngIf="tourId">

    <div class="form-group">
      <label>Tour</label>
      <select [(ngModel)]="tourId" name="tourId" disabled>
        <option *ngFor="let t of tours" [ngValue]="t.id">
          {{ t.tourName }}
        </option>
      </select>
    </div>

    <hr>

    <div *ngFor="let item of activities; let i = index" class="activity-box">

      <div class="form-group">
        <label>Ngày</label>
        <input type="number"
               [(ngModel)]="item.dayNumber"
               name="day{{i}}"
               min="1"
               required>
      </div>

      <div class="form-group">
        <label>Thời gian</label>
        <input type="time"
               [(ngModel)]="item.time"
               name="time{{i}}"
               required>
      </div>

      <div class="form-group">
        <label>Hoạt động</label>
        <input type="text"
               [(ngModel)]="item.activity"
               name="activity{{i}}"
               required>
      </div>

      <div class="form-group">
        <label>Mô tả</label>
        <input type="text"
               [(ngModel)]="item.description"
               name="desc{{i}}">
      </div>

      <hr>

    </div>

    <button type="button" class="btn-secondary" (click)="addActivity()">
      + Thêm hoạt động
    </button>

    <div class="btn-group">
      <button type="button" class="btn-secondary" (click)="goBack()">Hủy</button>
      <button type="submit" class="btn-primary">Cập nhật</button>
    </div>

  </form>

</div>
