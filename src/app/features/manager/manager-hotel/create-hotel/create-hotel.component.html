<div class="edit-container">
  <h2>Thêm khách sạn</h2>

  <form (ngSubmit)="saveHotel()" *ngIf="hotel">

    <div class="form-group">
      <label>Tên khách sạn</label>
      <input type="text" [(ngModel)]="hotel.hotelName" name="hotelName" required>
    </div>

    <div class="form-group">
      <label>Địa chỉ</label>
      <input type="text" [(ngModel)]="hotel.address" name="address" required>
    </div>

    <div class="form-group">
      <label>Mô tả</label>
      <textarea [(ngModel)]="hotel.description" name="description"></textarea>
    </div>

    <div class="btn-group">
      <button type="button" class="btn-secondary" (click)="goBack()">
        Hủy
      </button>

      <button type="submit" class="btn-primary">
        Lưu
      </button>
    </div>

  </form>
</div>
