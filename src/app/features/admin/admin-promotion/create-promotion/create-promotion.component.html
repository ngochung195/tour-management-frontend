<div class="edit-container">

  <h2>Thêm Khuyến mãi</h2>

  <form (ngSubmit)="savePromotion()" *ngIf="promotion">

    <div class="form-group">
      <label>Mã khuyến mãi</label>
      <input type="text"
             [(ngModel)]="promotion.code"
             name="code"
             required
             placeholder="VD: SALE10">
    </div>

    <div class="form-group">
      <label>Giảm giá (%)</label>
      <input type="number"
             [(ngModel)]="promotion.discount"
             name="discount"
             min="1"
             max="100"
             required>
    </div>

    <div class="form-group">
      <label>Ngày bắt đầu</label>
      <input type="datetime-local"
             [(ngModel)]="promotion.startDate"
             name="startDate"
             required>
    </div>

    <div class="form-group">
      <label>Ngày kết thúc</label>
      <input type="datetime-local"
             [(ngModel)]="promotion.endDate"
             name="endDate"
             required>
    </div>

    <div class="form-group">
      <label>Trạng thái</label>
      <select [(ngModel)]="promotion.active" name="isActive">
        <option [ngValue]="true">Hoạt động</option>
        <option [ngValue]="false">Không hoạt động</option>
      </select>
    </div>

    <div class="btn-group">

      <button type="button"
              class="btn-secondary"
              (click)="goBack()">
        Hủy
      </button>

      <button type="submit"
              class="btn-primary">
        Lưu
      </button>

    </div>

  </form>

</div>
