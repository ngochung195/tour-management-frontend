<div class="booking-wrapper">

    <h2 class="title">Quản lý Booking</h2>

    <div class="filter-form">

        <input type="text" placeholder="Tìm theo tên tour..." [(ngModel)]="searchTour" />

        <input type="text" placeholder="Tìm theo tên khách hàng..." [(ngModel)]="searchUser" />

        <input type="date" [(ngModel)]="searchDate" />

        <select [(ngModel)]="searchStatus">
            <option value="">-- Trạng thái --</option>
            <option value="PENDING">Chờ xử lý</option>
            <option value="APPROVED">Đã xác nhận</option>
            <option value="REJECTED">Bị từ chối</option>
        </select>

        <button class="btn-search" (click)="applyFilters()">
            Tìm kiếm
        </button>

        <button class="btn-reset" (click)="resetFilters()">
            Xóa lọc
        </button>

    </div>

    <table class="table" *ngIf="pagedBookings.length > 0">
        <thead>
            <tr>
                <th>ID</th>
                <th>Tour</th>
                <th>Khách hàng</th>
                <th>Số lượng</th>
                <th>Tổng tiền</th>
                <th>Ngày đặt</th>
                <th>Trạng thái</th>
                <th>Hành động</th>
            </tr>
        </thead>

        <tbody>
            <tr *ngFor="let b of pagedBookings">
                <td>{{ b.id }}</td>
                <td>{{ b.tourName }}</td>
                <td>{{ b.userName }}</td>
                <td>{{ b.quantity }}</td>
                <td>{{ b.total | number }} đ</td>
                <td>{{ b.bookingDate | date:'dd/MM/yyyy HH:mm' }}</td>

                <td>
                    <span class="status" [ngClass]="b.status.toLowerCase()">
                        {{ getStatusLabel(b.status) }}
                    </span>
                </td>

                <td>
                    <div class="action-buttons">
                        <button *ngIf="b.status === 'PENDING'" class="btn-approve"
                                (click)="updateStatus(b.id, 'APPROVED')">
                          Duyệt
                        </button>

                        <button *ngIf="b.status === 'PENDING'" class="btn-reject"
                                (click)="updateStatus(b.id, 'REJECTED')">
                          Từ chối
                        </button>
                        <button class="icon-btn delete-btn" (click)="deleteBooking(b.id)" title="Xóa">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>

    <div *ngIf="filteredBookings.length === 0" class="empty">
        Không có booking nào.
    </div>

    <div class="pagination" *ngIf="totalPages > 1">
      <button (click)="changePage(currentPage - 1)" [disabled]="currentPage === 1">«</button>

      <ng-container *ngIf="visiblePages[0] > 1">
        <button (click)="changePage(1)">1</button>
        <span *ngIf="visiblePages[0] > 2">...</span>
      </ng-container>

      <button *ngFor="let page of visiblePages" (click)="changePage(page)" [class.active]="page === currentPage">
        {{ page }}
      </button>

      <ng-container *ngIf="visiblePages[visiblePages.length - 1] < totalPages">
        <span *ngIf="visiblePages[visiblePages.length - 1] < totalPages - 1">...</span>
        <button (click)="changePage(totalPages)">
          {{ totalPages }}
        </button>
      </ng-container>

      <button (click)="changePage(currentPage + 1)" [disabled]="currentPage === totalPages">»</button>

      <input type="number" [(ngModel)]="pageInput" (keyup.enter)="goToPage()"
             placeholder="Trang" min="1" [max]="totalPages"/>
    </div>
</div>
