<div class="edit-container">

    <h2>Sửa Người dùng</h2>

    <form (ngSubmit)="updateUser()" *ngIf="user">

        <div class="form-group">
            <label>Tên người dùng</label>
            <input type="text" [(ngModel)]="user.userName" name="userName" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" [(ngModel)]="user.email" name="email" required>
        </div>

        <div class="form-group">
            <label>Mật khẩu mới</label>
            <input type="password" [(ngModel)]="user.password" name="password">
        </div>

        <div class="form-group">
            <label>Vai trò</label>

            <select [(ngModel)]="user.roleName" name="roleName">

                <option value="">Chọn vai trò</option>

                <option *ngFor="let r of roles" [value]="r.roleName">
                    {{ r.roleName }}
                </option>

            </select>

        </div>

        <div class="form-group">
            <label>Điện thoại</label>
            <input type="text" [(ngModel)]="user.phone" name="phone">
        </div>

        <div class="form-group">
            <label>Địa chỉ</label>
            <input type="text" [(ngModel)]="user.address" name="address">
        </div>

        <div class="btn-group">

            <button type="button" class="btn-secondary" (click)="goBack()">
                Hủy
            </button>

            <button type="submit" class="btn-primary">
                Cập nhật
            </button>

        </div>

    </form>

</div>
