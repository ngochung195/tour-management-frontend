<div class="edit-container">
    <h2>Thêm Người dùng</h2>

    <form (ngSubmit)="saveUser()" *ngIf="user">

        <div class="form-group">
            <label>Tên người dùng</label>
            <input type="text" [(ngModel)]="user.userName" name="userName" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" [(ngModel)]="user.email" name="email" required>
        </div>

        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" [(ngModel)]="user.password" name="password" required>
        </div>

        <div class="form-group">
            <label>Vai trò</label>
            <select [(ngModel)]="user.roleName" name="roleName" required>

                <option value="">Chọn vai trò</option>

                <option *ngFor="let r of roles" [value]="r.roleName">
                    {{ r.roleName }}
                </option>

            </select>
        </div>

        <div class="form-group">
            <label>Số điện thoại</label>
            <input type="text" [(ngModel)]="user.phone" name="phone">
        </div>

        <div class="form-group">
            <label>Địa chỉ</label>
            <input type="text" [(ngModel)]="user.address" name="address">
        </div>

        <div class="btn-group">

            <button type="button" class="btn-secondary" (click)="goBack()">
                Hủy
            </button>

            <button type="submit" class="btn-primary">
                Lưu
            </button>

        </div>

    </form>
</div>
